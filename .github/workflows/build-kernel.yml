name: Build RushKernel

on:
  push:
    branches: [ main ]
    paths:
      - 'config/**'
      - 'anykernel/**'
      - '.github/workflows/build-kernel.yml'
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Build variant'
        type: choice
        options:
          - vanilla
          - westwood
          - rushkernel-full
        default: vanilla
      version:
        description: 'Version tag'
        required: false
        default: 'v0.1.0-vanilla'

env:
  KERNEL_NAME: RushKernel
  DEVICE_CODENAME: b0s
  DEVICE_MODEL: SM-S908B
  KERNEL_SOURCE_URL: https://github.com/hacenbm144-spec/RushKernel/releases/download/SM-908B-source/Kernel.tar.gz
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3
  ARCH: arm64
  DEFCONFIG: s5e9925-b0sxxx_defconfig
  TARGET_SOC: s5e9925
  PLATFORM_VERSION: '12'
  ANDROID_MAJOR_VERSION: s

jobs:
  build:
    name: Build kernel for b0s
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout RushKernel repo
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev make libelf-dev libncurses5-dev zstd lz4 cpio python3 git wget unzip device-tree-compiler ccache gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi pahole rsync

      - name: Set build metadata
        run: |
          echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV
          VARIANT_VAL="${{ inputs.build_variant }}"
          if [ -z "$VARIANT_VAL" ]; then VARIANT_VAL="vanilla"; fi
          echo "VARIANT=$VARIANT_VAL" >> $GITHUB_ENV
          VERSION_VAL="${{ inputs.version }}"
          if [ -z "$VERSION_VAL" ]; then VERSION_VAL="v0.1.0-vanilla"; fi
          echo "VERSION=$VERSION_VAL" >> $GITHUB_ENV
          echo "ZIP_NAME=${{ env.KERNEL_NAME }}-$VARIANT_VAL-${{ env.DEVICE_CODENAME }}-$(date +%Y%m%d).zip" >> $GITHUB_ENV

      - name: Download Samsung kernel source
        run: |
          echo "Downloading Samsung's official Android 16 kernel source..."
          wget -q --show-progress "${{ env.KERNEL_SOURCE_URL }}" -O Kernel.tar.gz
          ls -lh Kernel.tar.gz
          echo "Extracting..."
          mkdir -p kernel
          tar -xzf Kernel.tar.gz -C kernel
          rm Kernel.tar.gz
          if [ -d kernel/Kernel ]; then
            mv kernel/Kernel/* kernel/
            mv kernel/Kernel/.* kernel/ 2>/dev/null || true
            rmdir kernel/Kernel
          fi
          echo "Kernel source structure:"
          ls -la kernel/ | head -20
          echo ""
          echo "Verifying it is the right source:"
          head -10 kernel/Makefile
          echo ""
          echo "Looking for b0s defconfig:"
          ls kernel/arch/arm64/configs/ | grep -i b0s || echo "Not found in arch/arm64/configs"

      - name: Set up Clang toolchain
        run: |
          mkdir -p toolchain/clang
          cd toolchain/clang
          LATEST_URL=$(curl -s https://raw.githubusercontent.com/ZyCromerZ/Clang/main/Clang-15-link.txt | tr -d '[:space:]')
          echo "Downloading from: $LATEST_URL"
          wget -q "$LATEST_URL" -O clang.tar.gz
          tar -xzf clang.tar.gz
          rm clang.tar.gz
          ls bin/clang
          bin/clang --version

      - name: Apply Samsung Makefile patches
        run: |
          cd kernel
          echo "Patch: Remove GCC wrapper from Makefile if present"
          if grep -q "REAL_CC" Makefile; then
            sed -i 's/REAL_CC.*=.*/CC = $(CROSS_COMPILE)gcc/' Makefile
            echo "REAL_CC removed"
          fi
          if grep -q "CFP_CC" Makefile; then
            sed -i '/CFP_CC/d' Makefile
            echo "CFP_CC removed"
          fi
          if grep -q "scripts/gcc-wrapper" Makefile; then
            sed -i '/scripts\/gcc-wrapper/d' Makefile
            echo "gcc-wrapper reference removed"
          fi
          echo "Makefile patches applied"

      - name: Fix Samsung kernel C syntax issues
        run: |
          cd kernel
          echo "Fix 1: sec_mpam.c old K&R C syntax (declaration only, not call site)"
          if [ -f kernel/sched/sec_mpam.c ]; then
            sed -i 's/static int mpam_late_init_register()/static int mpam_late_init_register(void)/' kernel/sched/sec_mpam.c
            sed -i 's/mpam_late_init_register(void);/mpam_late_init_register();/g' kernel/sched/sec_mpam.c
            echo "After patches:"
            grep -n "mpam_late_init_register" kernel/sched/sec_mpam.c
          fi
          echo "Fix 2: exynos-devfreq.h missing return type"
          if [ -f include/soc/samsung/exynos-devfreq.h ]; then
            sed -i 's/^extern exynos_devfreq_alt_mode_change/extern int exynos_devfreq_alt_mode_change/' include/soc/samsung/exynos-devfreq.h
            echo "After patch:"
            grep -n "exynos_devfreq_alt_mode_change" include/soc/samsung/exynos-devfreq.h
          fi
          echo "Fix 3: Disable strict warnings globally as safety net"
          sed -i 's/-Werror=strict-prototypes/-Wno-error=strict-prototypes/g' Makefile
          sed -i 's/-Werror=implicit-int/-Wno-error=implicit-int/g' Makefile
          sed -i 's/-Werror=implicit-function-declaration/-Wno-error=implicit-function-declaration/g' Makefile
          echo "Fix 4: Add comprehensive -Wno flags to KBUILD_CFLAGS"
          if ! grep -q "Wno-implicit-int" Makefile; then
            sed -i 's|KBUILD_CFLAGS   :=|KBUILD_CFLAGS   := -Wno-strict-prototypes -Wno-error=strict-prototypes -Wno-implicit-int -Wno-error=implicit-int -Wno-implicit-function-declaration -Wno-error=implicit-function-declaration -Wno-error|' Makefile
          fi
          echo "All Samsung C syntax fixes applied"

      - name: Apply variant-specific config
        if: env.VARIANT != 'vanilla'
        run: |
          cd kernel
          if [ "${{ env.VARIANT }}" = "westwood" ]; then
            echo "Adding Westwood TCP support..."
            cp ../config/westwood.config arch/arm64/configs/westwood.config
          elif [ "${{ env.VARIANT }}" = "rushkernel-full" ]; then
            echo "Adding full RushKernel features..."
            cp ../config/rushkernel.config arch/arm64/configs/rushkernel.config
          fi

      - name: Configure kernel
        run: |
          cd kernel
          export PATH="${GITHUB_WORKSPACE}/toolchain/clang/bin:${PATH}"
          export TARGET_SOC=${{ env.TARGET_SOC }}
          export PLATFORM_VERSION=${{ env.PLATFORM_VERSION }}
          export ANDROID_MAJOR_VERSION=${{ env.ANDROID_MAJOR_VERSION }}
          export LLVM=1 LLVM_IAS=1
          export ARCH=${{ env.ARCH }}
          echo "Build Environment:"
          echo "TARGET_SOC: $TARGET_SOC"
          echo "PLATFORM_VERSION: $PLATFORM_VERSION"
          echo "ANDROID_MAJOR_VERSION: $ANDROID_MAJOR_VERSION"
          echo "VARIANT: ${{ env.VARIANT }}"
          if [ "${{ env.VARIANT }}" = "vanilla" ]; then
            make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- ${{ env.DEFCONFIG }}
          elif [ "${{ env.VARIANT }}" = "westwood" ]; then
            make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- ${{ env.DEFCONFIG }} westwood.config
          elif [ "${{ env.VARIANT }}" = "rushkernel-full" ]; then
            make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- ${{ env.DEFCONFIG }} rushkernel.config
          fi

      - name: Build kernel
        run: |
          cd kernel
          export PATH="${GITHUB_WORKSPACE}/toolchain/clang/bin:${PATH}"
          export TARGET_SOC=${{ env.TARGET_SOC }}
          export PLATFORM_VERSION=${{ env.PLATFORM_VERSION }}
          export ANDROID_MAJOR_VERSION=${{ env.ANDROID_MAJOR_VERSION }}
          export LLVM=1 LLVM_IAS=1
          export ARCH=${{ env.ARCH }}
          export KBUILD_BUILD_USER="hacenbm144"
          export KBUILD_BUILD_HOST="RushKernel-CI-${{ env.VARIANT }}"
          echo "Starting kernel compilation..."
          set -o pipefail
          make -j$(nproc) ARCH=arm64 LLVM=1 LLVM_IAS=1 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- Image dtbs 2>&1 | tee ../build.log

      - name: Verify build output
        run: |
          cd kernel/arch/arm64/boot
          ls -la
          file Image* dtb* dtbo* 2>/dev/null || true
          if [ ! -f Image ]; then
            echo "ERROR: No raw kernel Image produced!"
            exit 1
          fi
          echo "Kernel built successfully"
          file Image
          echo "Kernel size: $(stat -c %s Image) bytes"

      - name: Set up AnyKernel3
        run: |
          git clone --depth=1 ${{ env.ANYKERNEL_REPO }} AnyKernel3
          rm -f AnyKernel3/anykernel.sh
          cp anykernel/anykernel.sh AnyKernel3/anykernel.sh
          chmod +x AnyKernel3/anykernel.sh

      - name: Copy kernel to AnyKernel3
        run: |
          cp kernel/arch/arm64/boot/Image AnyKernel3/Image
          if [ -f kernel/arch/arm64/boot/dtbo.img ]; then
            cp kernel/arch/arm64/boot/dtbo.img AnyKernel3/
            echo "dtbo.img included"
          fi
          if [ -f kernel/arch/arm64/boot/dtb.img ]; then
            cp kernel/arch/arm64/boot/dtb.img AnyKernel3/
          fi
          ls -la AnyKernel3/

      - name: Package AnyKernel3 zip
        run: |
          cd AnyKernel3
          zip -r9 "../${{ env.ZIP_NAME }}" . -x ".git/*" "README.md" "*.gitignore"
          cd ..
          ls -la ${{ env.ZIP_NAME }}
          sha256sum ${{ env.ZIP_NAME }} > ${{ env.ZIP_NAME }}.sha256

      - name: Upload kernel zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_NAME }}-${{ env.VARIANT }}-${{ env.BUILD_DATE }}-${{ env.SHORT_SHA }}
          path: |
            ${{ env.ZIP_NAME }}
            ${{ env.ZIP_NAME }}.sha256
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ env.VARIANT }}-${{ env.BUILD_DATE }}-${{ env.SHORT_SHA }}
          path: build.log
          retention-days: 14